# ============================================================
# 追番向导 · 生产 compose
# ------------------------------------------------------------
# 业务动机：
#   服务器侧只放本文件 + .env，docker compose pull && up -d 完成发版
#   GitHub Actions 把镜像推到 GHCR 后通过 SSH 触发本文件拉新版重启
#
# 网络拓扑：
#   - app      暴露 127.0.0.1:3000，由宿主机 nginx/caddy 反代到 443
#   - postgres 仅在内部网络可访问，不暴露到宿主机端口（防止公网误暴露）
#
# 数据持久化：
#   命名 volume zhuifanhub_pgdata，docker compose down 不会清数据
#   备份方案：宿主机 cron + pg_dump 进 volume 之外的目录（见 docs/deployment.md）
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: zhuifanhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zhuifanhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-zhuifanhub}
    volumes:
      - zhuifanhub_pgdata:/var/lib/postgresql/data
    healthcheck:
      # pg_isready 比 TCP 探测更准确，避免 prisma migrate 在 server 半启动时连过去
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zhuifanhub} -d ${POSTGRES_DB:-zhuifanhub}"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - zhuifanhub-net

  app:
    # IMAGE_TAG 由 GitHub Actions 部署阶段写入 .env，默认 latest 兜底
    image: ghcr.io/${GHCR_OWNER}/zhuifanhub:${IMAGE_TAG:-latest}
    container_name: zhuifanhub-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ---- 应用自身配置 ----
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
      # ---- 数据库连接 ----
      # 这里用容器内 hostname=postgres，端口固定 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-zhuifanhub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zhuifanhub}
      # ---- 对象存储 ----
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_BASE: ${S3_PUBLIC_BASE:-}
    ports:
      # 仅绑定 127.0.0.1，强制走宿主 nginx/caddy；想直接对公网请改成 "3000:3000"
      - "127.0.0.1:3000:3000"
    networks:
      - zhuifanhub-net

networks:
  zhuifanhub-net:
    driver: bridge

volumes:
  zhuifanhub_pgdata:
